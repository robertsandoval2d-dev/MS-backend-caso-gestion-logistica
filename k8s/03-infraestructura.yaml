# ─── Config Server ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: ferreteria-psa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: config-server:latest
          imagePullPolicy: IfNotPresent        # usa imagen local de Docker Desktop
          ports:
            - containerPort: 8888
#          readinessProbe:
#            httpGet:
#              path: /261DSWG2SpringMSLogisticaDemo01Seguridad/default
#              port: 8888
#            initialDelaySeconds: 20
#            periodSeconds: 10
#            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: ferreteria-psa
spec:
  selector:
    app: config-server
  ports:
    - port: 8888
      targetPort: 8888

# ─── Eureka Server ──────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: ferreteria-psa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: eureka-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-server:8888"
#              valueFrom:
#                configMapKeyRef:
#                  name: ms-config
#                  key: CONFIG_URL
#          readinessProbe:
#            httpGet:
#              path: /actuator/health
#              port: 8761
#            initialDelaySeconds: 30  #SUBIR DESPUES
#            periodSeconds: 10
#            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: ferreteria-psa
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761
  # Para ver el dashboard desde el navegador:
  type: NodePort