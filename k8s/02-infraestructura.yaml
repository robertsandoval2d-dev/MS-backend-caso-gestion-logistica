# ─── Config Server ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: ferreteria-psa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: config-server
          imagePullPolicy: Never
          ports:
            - containerPort: 8888
          readinessProbe:
            httpGet:
              path: /261DSWG2SpringMSLogisticaDemo01Seguridad/default
              port: 8888
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: ferreteria-psa
spec:
  selector:
    app: config-server
  ports:
    - port: 8888
      targetPort: 8888

# ─── Eureka Server ──────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: ferreteria-psa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: eureka-server
          imagePullPolicy: Never
          ports:
            - containerPort: 8761
          env:
            - name: SPRING_CONFIG_IMPORT
              valueFrom:
                configMapKeyRef:
                  name: ms-config
                  key: CONFIG_URL
            - name: SERVER_PORT
              value: "8761"
            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "false"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-server:8761/eureka/"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: ferreteria-psa
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761
  type: NodePort
