# ─── MySQL — Logística ──────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-glogistica
  namespace: ferreteria-psa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-glogistica
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql-glogistica
    spec:
      containers:
        - name: mysql-glogistica
          image: mysql:8.4
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: ms_logistica_gestion_logistica_db
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ms-secrets
                  key: MYSQL_ROOT_PASSWORD
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mysqladmin ping -h localhost -uroot -proot
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 10
          volumeMounts:
            - name: mysqldata-glogistica
              mountPath: /var/lib/mysql
      volumes:
        - name: mysqldata-glogistica
          persistentVolumeClaim:
            claimName: mysqldata-glogistica
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-glogistica
  namespace: ferreteria-psa
spec:
  selector:
    app: mysql-glogistica
  ports:
    - port: 3306
      targetPort: 3306

# ─── PostgreSQL — Comercial ─────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-gcomercial
  namespace: ferreteria-psa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-gcomercial
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: postgres-gcomercial
    spec:
      containers:
        - name: postgres-gcomercial
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ms_logistica_gestion_comercial_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ms-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ms-secrets
                  key: POSTGRES_PASSWORD
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - ms_logistica_gestion_comercial_db
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: pgdata-gcomercial
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata-gcomercial
          persistentVolumeClaim:
            claimName: pgdata-gcomercial
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-gcomercial
  namespace: ferreteria-psa
spec:
  selector:
    app: postgres-gcomercial
  ports:
    - port: 5432
      targetPort: 5432
