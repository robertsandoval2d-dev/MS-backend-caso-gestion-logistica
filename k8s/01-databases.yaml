# ─── PVCs ───────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlserverdata-seguridad
  namespace: ferreteria-psa
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi   # SQL Server necesita mínimo 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysqldata-glogistica
  namespace: ferreteria-psa
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgdata-gcomercial
  namespace: ferreteria-psa
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi

# ─── SQL Server — Seguridad ──────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlserver-seguridad
  namespace: ferreteria-psa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqlserver-seguridad
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sqlserver-seguridad
    spec:
      containers:
        - name: sqlserver-seguridad
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - containerPort: 1433
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: Developer
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ms-secrets
                  key: MSSQL_SA_PASSWORD
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'SqlServer@12345' -C -Q 'SELECT 1'
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          volumeMounts:
            - name: sqlserverdata-seguridad
              mountPath: /var/opt/mssql
      volumes:
        - name: sqlserverdata-seguridad
          persistentVolumeClaim:
            claimName: sqlserverdata-seguridad
---
apiVersion: v1
kind: Service
metadata:
  name: sqlserver-seguridad
  namespace: ferreteria-psa
spec:
  selector:
    app: sqlserver-seguridad
  ports:
    - port: 1433
      targetPort: 1433

# ─── Init DB SQL Server ─────────────────────────────────────────
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: init-seguridad-db-cm0
  namespace: ferreteria-psa
data:
  create_db_seguridad.sql: |-
    IF DB_ID('ms_logistica_seguridad_db') IS NULL
    BEGIN
        CREATE DATABASE ms_logistica_seguridad_db;
    END;
---
apiVersion: batch/v1
kind: Job
metadata:
  name: init-seguridad-db
  namespace: ferreteria-psa
spec:
  template:
    spec:
      containers:
        - name: init-seguridad-db
          image: mcr.microsoft.com/mssql/server:2022-latest
          args:
            - bash
            - -c
            - "sleep 30 && /opt/mssql-tools18/bin/sqlcmd -S sqlserver-seguridad -U sa -P 'SqlServer@12345' -C -i /scripts/create_db_seguridad.sql"
          volumeMounts:
            - name: init-script
              mountPath: /scripts
      volumes:
        - name: init-script
          configMap:
            name: init-seguridad-db-cm0
      restartPolicy: Never
  backoffLimit: 3

