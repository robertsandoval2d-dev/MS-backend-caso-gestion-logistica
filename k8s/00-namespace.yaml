apiVersion: v1
kind: Namespace
metadata:
  name: ferreteria-psa

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: ms-config
  namespace: ferreteria-psa
data:
  EUREKA_URL: "http://eureka-server:8761/eureka"
  CONFIG_URL: "optional:configserver:http://config-server:8888"

---

apiVersion: v1
kind: Secret
metadata:
  name: ms-secrets
  namespace: ferreteria-psa
type: Opaque
stringData:
  TOKEN_JWT_SECRET: "mi_clave_super_larga_y_segura_1234567890_abcd"
  ADMIN_PASSWORD: "admin123"
  # PostgreSQL
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  # MySQL
  MYSQL_ROOT_PASSWORD: "root"
  # SQL Server
  MSSQL_SA_PASSWORD: "SqlServer@12345"