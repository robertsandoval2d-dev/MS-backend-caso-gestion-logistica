# ─── PersistentVolumeClaims ─────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-postgres-seguridad
  namespace: ferreteria-psa
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-postgres-glogistica
  namespace: ferreteria-psa
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-postgres-gcomercial
  namespace: ferreteria-psa
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

# ─── DB Seguridad ───────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-seguridad
  namespace: ferreteria-psa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-seguridad
  template:
    metadata:
      labels:
        app: postgres-seguridad
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ms_logistica_seguridad_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ms-secrets
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ms-secrets
                  key: DB_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "ms_logistica_seguridad_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: pvc-postgres-seguridad
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-seguridad
  namespace: ferreteria-psa
spec:
  selector:
    app: postgres-seguridad
  ports:
    - port: 5432
      targetPort: 5432

