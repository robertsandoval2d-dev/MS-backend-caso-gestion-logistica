services:

  # Seguridad Database Service (Isolated)
  # postgres-seguridad:
  #   image: postgres:16-alpine
  #   container_name: postgres-seguridad
  #   ports:
  #     - "5433:5432" # Exposed on port 5433 to avoid collision on host machine
  #   environment:
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=postgres
  #     - POSTGRES_DB=ms_logistica_seguridad_db
  #   volumes:
  #     - pgdata-seguridad:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres -d ms_logistica_seguridad_db"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  # Seguridad Database Service (Isolated)
  sqlserver-seguridad:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-seguridad
    ports:
      - "1434:1433" # Exposed on port 1434 to avoid collision on host machine
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
      - MSSQL_SA_PASSWORD=SqlServer@12345
    volumes:
      - sqlserverdata-seguridad:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'SqlServer@12345' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  init-seguridad-db:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      sqlserver-seguridad:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    command: >
      bash -c "
      sleep 30 &&
      /opt/mssql-tools/bin/sqlcmd
      -S sqlserver-seguridad
      -U sa
      -P 'SqlServer@12345'
      -C
      -i /scripts/create_db_seguridad.sql
      "

  # Gestion Logistica Database Service (Isolated)
  # postgres-glogistica:
  #   image: postgres:16-alpine
  #   container_name: postgres-glogistica
  #   ports:
  #     - "5434:5432" # Exposed on port 5434 to avoid collision on host machine
  #   environment:
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=postgres
  #     - POSTGRES_DB=ms_logistica_gestion_logistica_db
  #   volumes:
  #     - pgdata-glogistica:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres -d ms_logistica_gestion_logistica_db"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  # Gestion Logistica Database Service (Isolated)
  mysql-glogistica:
    image: mysql:8.4
    container_name: mysql-glogistica
    ports:
      - "3308:3306" # Exposed on port 3308 to avoid collision on host machine
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=ms_logistica_gestion_logistica_db
    volumes:
      - mysqldata-glogistica:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Gestion Comercial Database Service (Isolated)
  postgres-gcomercial:
    image: postgres:16-alpine
    container_name: postgres-gcomercial
    ports:
      - "5435:5432" # Exposed on port 5434 to avoid collision on host machine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ms_logistica_gestion_comercial_db
    volumes:
      - pgdata-gcomercial:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ms_logistica_gestion_comercial_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Config Server
  config-server:
    build: ./261DSWG2SpringMSLogisticaDemo01Config
    image: config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      sqlserver-seguridad:
        condition: service_healthy
      mysql-glogistica:
        condition: service_healthy
      postgres-gcomercial:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/261DSWG2SpringMSLogisticaDemo01Seguridad/default || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Eureka Server
  eureka-server:
    build: ./261DSWG2SpringMSLogisticaDemo01Eureka
    image: eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # Seguridad Service
  seguridad-service:
    build: ./261DSWG2SpringMSLogisticaDemo01Seguridad
    image: seguridad-service
    container_name: seguridad-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver-seguridad:1433;databaseName=ms_logistica_seguridad_db;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=SqlServer@12345
      - TOKEN_JWT_SECRET=mi_clave_super_larga_y_segura_1234567890_abcd
      - ADMIN_PASSWORD=admin123
    depends_on:
      sqlserver-seguridad:
        condition: service_healthy
      init-seguridad-db:
        condition: service_completed_successfully
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # Gestion Logistica Service
  glogistica-service:
    build: ./261DSWG2SpringMSLogisticaDemo01GestionLogistica
    image: glogistica-service
    container_name: glogistica-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-glogistica:3306/ms_logistica_gestion_logistica_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - TOKEN_JWT_SECRET=mi_clave_super_larga_y_segura_1234567890_abcd
    depends_on:
      mysql-glogistica:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # Gestion Comercial Service
  gcomercial-service:
    build: ./261DSWG2SpringMSLogisticaDemo01GestionComercial
    image: gcomercial-service
    container_name: gcomercial-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-gcomercial:5432/ms_logistica_gestion_comercial_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - TOKEN_JWT_SECRET=mi_clave_super_larga_y_segura_1234567890_abcd
    depends_on:
      postgres-gcomercial:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # Gateway
  gateway:
    build: ./261DSWG2SpringMSLogisticaDemo01Gateway
    image: gateway
    container_name: gateway
    ports:
      - "8085:8080"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      seguridad-service:
        condition: service_started
      glogistica-service:
        condition: service_started
      gcomercial-service:
        condition: service_started

volumes:
  # pgdata-seguridad:
  sqlserverdata-seguridad:
  # pgdata-glogistica:
  mysqldata-glogistica:
  pgdata-gcomercial: